# Proof generation (requires ORG_ID, FINP2P_ADDRESS, OSS_URL, SIGNER_PRIVATE_KEY)
adapter.proof.enabled=false

# Log level (overridable via LOG_LEVEL env var)
logging.level.root=${LOG_LEVEL:INFO}

# App runtime database (least-privilege LEDGER_USER)
spring.datasource.url=${DB_CONNECTION_STRING}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# Flyway migrations (privileged admin connection)
spring.flyway.enabled=true
spring.flyway.url=${MIGRATION_CONNECTION_STRING:${DB_CONNECTION_STRING}}
spring.flyway.user=${MIGRATION_USERNAME:${DB_USERNAME}}
spring.flyway.password=${MIGRATION_PASSWORD:${DB_PASSWORD}}
spring.flyway.locations=classpath:db/migration/skeleton,classpath:db/migration/adapter
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.ledger_user=${LEDGER_USER:}
