# Proof generation (requires ORG_ID, FINP2P_ADDRESS, OSS_URL, SIGNER_PRIVATE_KEY)
adapter.proof.enabled=false

# Log level (overridable via LOG_LEVEL env var)
logging.level.root=${LOG_LEVEL:INFO}

# Database
spring.datasource.url=${DB_CONNECTION_STRING}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:skeleton-schema.sql,classpath:schema.sql
