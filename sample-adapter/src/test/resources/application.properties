ORG_ID=test-org
adapter.proof.enabled=false

# App runtime database
spring.datasource.url=${DB_CONNECTION_STRING}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway (tests use same connection for both migration and runtime)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/skeleton,classpath:db/migration/adapter
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.ledger_user=
